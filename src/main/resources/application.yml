spring:
  application:
    name: outdoor-gear-recommendation

  # 数据源（阶段二建表后可启用；未建库前可暂时注释或使用 H2 profile）
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:outdoor_gear}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  # JPA（阶段二配置实体后启用；ddl-auto 生产环境改为 validate）
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  # Redis（阶段五推荐缓存、可选登出黑名单；未安装时可先不配，相关功能做空实现）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

server:
  port: 8080

# JWT（生产环境请用环境变量 JWT_SECRET 覆盖）
jwt:
  secret: ${JWT_SECRET:outdoor-gear-recommendation-jwt-secret-key-change-in-production}
  expiration-ms: 86400000
